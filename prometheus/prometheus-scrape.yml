# Prometheus scrape config for the FreeIPA monitoring pipeline.
# Drop the scrape_configs block into your /etc/prometheus/prometheus.yml.
# Full walkthrough: https://computingforgeeks.com/freeipa-healthcheck-prometheus-grafana/

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - "ipa-alerts.yml"

# --- Single IPA server ---
scrape_configs:
  - job_name: 'ipa-server'
    static_configs:
      - targets: ['ipa.example.com:9100']
        labels:
          role: 'ipa-primary'
          realm: 'EXAMPLE.COM'

